<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day 2 - Contact Form</title>
  <link rel="stylesheet" href="form.css" />
</head>
<body>

  <header class="header">
    <nav class="navbar">
      <h1 class="logo">Prathamesh</h1>

      <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">Skills</a></li>
        <li><a href="#">Projects</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="contact-section">
      <div class="contact-container">
        <div class="contact-content">
          <p class="subtitle">Contact Me</p>
          <h2>Let’s Work Together</h2>
          <p class="description">
            I am currently improving my frontend and React skills.
            Feel free to contact me for frontend development opportunities.
          </p>
        </div>

        <form class="contact-form">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input 
              type="text" 
              id="name" 
              placeholder="Enter your full name" 
              required 
            />
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input 
              type="email" 
              id="email" 
              placeholder="Enter your email address" 
              required 
            />
          </div>

          <div class="form-group">
            <label for="subject">Subject</label>
            <input 
              type="text" 
              id="subject" 
              placeholder="Enter subject" 
              required 
            />
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea 
              id="message" 
              rows="5" 
              placeholder="Write your message"
              required
            ></textarea>
          </div>

          <button type="submit" class="submit-btn">Send Message</button>
        </form>
      </div>
    </section>
  </main>

</body>
</html>
